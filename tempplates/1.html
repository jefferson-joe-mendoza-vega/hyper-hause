<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face ID System - Real Tracking Infinito</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --neon-alt: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--neon);
            overflow: hidden;
        }

        .tech-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--neon) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            margin-bottom: 25px;
        }

        #videoFeed, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efecto espejo */
        }

        #videoFeed {
            filter: brightness(0.8) contrast(1.2) grayscale(0.2);
            opacity: 0;
            transition: opacity 1s;
        }

        #output_canvas {
            z-index: 5;
            opacity: 0;
            transition: opacity 1s;
        }

        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon);
            box-shadow: 0 0 20px var(--neon);
            top: 0;
            animation: moveScan 3s infinite linear;
        }

        @keyframes moveScan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .hud-data {
            position: absolute;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--neon);
            opacity: 0.8;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 4px;
        }

        .data-tl { top: 20px; left: 20px; text-align: left; }
        .data-br { bottom: 20px; right: 20px; text-align: right; }

        .terminal {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass);
            padding: 15px;
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
            margin-bottom: 20px;
            height: 100px;
            overflow-y: auto;
        }

        .btn-auth {
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-auth:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 30px var(--neon);
        }

        .btn-auth:disabled {
            opacity: 0.5;
            cursor: wait;
            background: transparent;
            color: var(--neon);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="tech-bg"></div>

<div class="main-container">
    <div class="camera-container" id="container">
        <video id="videoFeed" autoplay playsinline muted></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
        
        <div class="hud-overlay" id="hud">
            <div class="scan-bar"></div>
            
            <div class="hud-data data-tl">
                SYS_BIOMETRIC_ID: ACTIVE<br>
                AI_MODEL: MEDIAPIPE_MESH<br>
                NODES_TRACKED: 468
            </div>
            
            <div class="hud-data data-br">
                STATUS: <span id="statusTxt">SCANNING</span><br>
                CONFIDENCE: <span id="confTxt">0.00</span>%
            </div>
        </div>
    </div>

    <div class="terminal" id="term">
        > SYSTEM_READY<br>
        > ESPERANDO ACTIVACIÓN DE CÁMARA...
    </div>

    <button class="btn-auth" id="startBtn" onclick="initBiometric()">
        Activar Rastreo Facial
    </button>
</div>

<script>
    const $ = id => document.getElementById(id);
    const videoElement = $('videoFeed');
    const canvasElement = $('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function logTerminal(msg) {
        const term = $('term');
        term.innerHTML += `<br>> ${msg}`;
        term.scrollTop = term.scrollHeight;
    }

    // Configuración de la IA de FaceMesh
    const faceMesh = new FaceMesh({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // Función que dibuja continuamente cuando la IA detecta la cara
    faceMesh.onResults((results) => {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiFaceLandmarks) {
            for (const landmarks of results.multiFaceLandmarks) {
                // Dibujar la malla de la cara completa en color neón
                drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, 
                             {color: '#00f2ff', lineWidth: 1});
                
                // Resaltar los ojos y contorno
                drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#7000ff', lineWidth: 2});
                drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#7000ff', lineWidth: 2});
                drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: '#00f2ff', lineWidth: 2});
            }
            
            // Simular nivel de confianza fluctuando
            $('confTxt').innerText = (Math.random() * (99.9 - 95.0) + 95.0).toFixed(2);
        }
        canvasCtx.restore();
    });

    async function initBiometric() {
        const btn = $('startBtn');
        const hud = $('hud');

        btn.disabled = true;
        btn.innerText = "SISTEMA ACTIVO";
        logTerminal("INICIALIZANDO RED NEURONAL...");
        logTerminal("DESCARGANDO MÓDULOS BIOMÉTRICOS...");

        try {
            // Activar la cámara usando las herramientas de MediaPipe
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            
            await camera.start();
            
            videoElement.style.opacity = "1";
            canvasElement.style.opacity = "1";
            hud.style.display = "block";
            
            logTerminal("CÁMARA CONECTADA.");
            logTerminal("RASTREO FACIAL EN TIEMPO REAL ACTIVO E INFINITO.");
            logTerminal("MAPEANDO 468 PUNTOS FACIALES...");

        } catch (err) {
            logTerminal("ERROR: NO SE PUDO ACCEDER A LA CÁMARA.");
            btn.innerText = "ERROR DE SISTEMA";
        }
    }
</script>

</body>
</html>
