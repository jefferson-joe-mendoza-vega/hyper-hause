<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Loader de Productos</title>
<style>
  /* --- Estilos Generales --- */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f8f9fa;
    padding: 2rem;
    margin: 0;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    padding: 16px;
    transition: transform 0.3s ease;
  }

  /* --- Animación Skeleton (Shimmer) --- */
  .skeleton {
    background: linear-gradient(90deg, #ececec 25%, #f5f5f5 50%, #ececec 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* --- Estructura del Skeleton --- */
  .skeleton-img { height: 180px; width: 100%; margin-bottom: 16px; }
  .skeleton-title { height: 24px; width: 80%; margin-bottom: 12px; }
  .skeleton-price { height: 20px; width: 40%; margin-bottom: 16px; }
  .skeleton-btn { height: 40px; width: 100%; border-radius: 8px; }

  /* --- Estilos del Producto Real (Ocultos inicialmente) --- */
  .product-content {
    display: none; /* Se oculta hasta que "cargue" */
    animation: fadeIn 0.5s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-image {
    width: 100%;
    height: 180px;
    background-color: #e0e7ff;
    border-radius: 8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4f46e5;
    font-weight: bold;
  }

  .product-title {
    margin: 0 0 10px 0;
    font-size: 1.2rem;
    color: #333;
  }

  .product-price {
    margin: 0 0 16px 0;
    font-size: 1.1rem;
    color: #4f46e5;
    font-weight: bold;
  }

  .btn-buy {
    width: 100%;
    padding: 12px;
    background-color: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s ease;
  }

  .btn-buy:hover { background-color: #4338ca; }
</style>
</head>
<body>

<div class="product-grid">
  <div class="card" id="card-1">
    <div class="skeleton-wrapper">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-price"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="product-content">
      <div class="product-image">Foto del Producto</div>
      <h3 class="product-title">Auriculares Inalámbricos</h3>
      <p class="product-price">$ 99.00</p>
      <button class="btn-buy">Añadir al carrito</button>
    </div>
  </div>

  <div class="card" id="card-2">
    <div class="skeleton-wrapper">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-price"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="product-content">
      <div class="product-image">Foto del Producto</div>
      <h3 class="product-title">Reloj Inteligente</h3>
      <p class="product-price">$ 149.50</p>
      <button class="btn-buy">Añadir al carrito</button>
    </div>
  </div>

  <div class="card" id="card-3">
    <div class="skeleton-wrapper">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-price"></div>
      <div class="skeleton skeleton-btn"></div>
    </div>
    <div class="product-content">
      <div class="product-image">Foto del Producto</div>
      <h3 class="product-title">Teclado Mecánico</h3>
      <p class="product-price">$ 85.00</p>
      <button class="btn-buy">Añadir al carrito</button>
    </div>
  </div>
</div>

<script>
  // Este script simula el tiempo que tarda tu servidor en enviar los datos
  // En tu proyecto real, reemplazarías esto cuando tu API o base de datos termine de cargar.
  
  setTimeout(() => {
    // Seleccionamos todas las tarjetas
    const cards = document.querySelectorAll('.card');
    
    cards.forEach(card => {
      // Ocultamos la animación de esqueleto
      card.querySelector('.skeleton-wrapper').style.display = 'none';
      // Mostramos el contenido real del producto con un efecto suave
      card.querySelector('.product-content').style.display = 'block';
    });
  }, 2500); // 2500 milisegundos = 2.5 segundos de "carga"
</script>

</body>
</html>
